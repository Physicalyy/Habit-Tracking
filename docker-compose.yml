services:
  mysql:
    image: mysql:8.0
    container_name: habit-tracking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - habit_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: apps/backend/habit-admin/Dockerfile
      args:
        JRE_IMAGE: ${BACKEND_JRE_IMAGE:-eclipse-temurin:17-jre}
    container_name: habit-tracking-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_OPTS: ${BACKEND_JAVA_OPTS:-}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_FLYWAY_ENABLED: "true"
      MYBATIS_PLUS_CONFIGURATION_MAP_UNDERSCORE_TO_CAMEL_CASE: "true"
      WECHAT_MINIPROGRAM_APPID: ${WECHAT_MINIPROGRAM_APPID}
      WECHAT_MINIPROGRAM_SECRET: ${WECHAT_MINIPROGRAM_SECRET}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-604800}
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8080"

volumes:
  habit_mysql_data:
